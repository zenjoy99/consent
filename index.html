<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>舞象基金會 — 同意書系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#F5E6D0;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{max-width:480px;width:100%;background:#FBF7F0;border-radius:12px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.hdr{background:#F5E6D0;padding:20px 24px;display:flex;align-items:center;gap:14px}
.hdr img{width:56px;height:56px;border-radius:50%;object-fit:cover}
.hdr h1{font-size:22px;font-weight:500;letter-spacing:2px}
.hdr p{font-size:12px;color:#7A6A50;margin-top:2px}
.bar{height:3px;background:#D4A657}
.bd{padding:28px 24px}
a.lk{display:block;text-decoration:none;padding:16px 20px;border:1px solid #E8D4B0;border-radius:8px;color:#2B2B2B;transition:.15s;background:white}
a.lk:hover{border-color:#C8512A;background:#FDF9F1}
a.lk .nm{font-size:16px;font-weight:500;margin-bottom:3px}
a.lk .ds{font-size:12px;color:#8A7A60}
a.lk .ar{float:right;color:#C8512A;font-size:20px;margin-top:-4px}
.note{font-size:11px;color:#B09A70;text-align:center;margin-top:20px;line-height:1.6}
.ft-img{width:100%;display:block;height:auto;max-height:70px;object-fit:cover}
.ft-bar{background:#5A4A30;padding:6px 0;text-align:center}
.ft-bar span{font-size:9px;color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <img src="/elephant.png" alt="Logo">
    <div><h1>舞象基金會</h1><p>Dancing With The Elephant</p></div>
  </div>
  <div class="bar"></div>
  <div class="bd">
    <a class="lk" href="/admin.html">
      <span class="ar">→</span>
      <div class="nm">同意書簽署回覆系統</div>
      <div class="ds">後台管理 — 建立同意書、產生志工連結</div>
    </a>
    <div class="note">管理員帳號：zenjoy99@gmail.com</div>
  </div>
  <img src="/savannah.png" alt="" class="ft-img">
  <div class="ft-bar"><span>dancingwiththelephant@gmail.com</span></div>
</div>
</body>
</html>
